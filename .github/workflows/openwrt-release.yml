name: Build & Release OpenWrt Package

on:
  push:
    branches:
      - main
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ["24.10", "snapshot"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract PKG metadata
        id: meta
        run: |
          eval $(grep -E 'PKG_(NAME|VERSION|RELEASE):=' Makefile | sed 's/:=/=/g')
          echo "pkg_name=${PKG_NAME}" >> $GITHUB_OUTPUT
          echo "tag_name=${PKG_NAME}-v${PKG_VERSION}-${PKG_RELEASE}" >> $GITHUB_OUTPUT
          echo "release_name=${PKG_NAME} v${PKG_VERSION}-${PKG_RELEASE}" >> $GITHUB_OUTPUT

      - name: Set up build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3-pip python3-venv rsync unzip zlib1g-dev \
            file wget libelf-dev ecj fastjar java-propose-classpath

      - name: Download OpenWrt SDK
        run: |
          BASE_URL=https://downloads.openwrt.org/releases/${{ matrix.target }}/targets/x86/64/
          SDK_URL=$(curl -s $BASE_URL | grep -o 'openwrt-sdk-.*\.tar\.xz' | head -n1)
          wget $BASE_URL$SDK_URL -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Copy package to SDK
        run: |
          mkdir -p sdk/package/${{ steps.meta.outputs.pkg_name }}
          rsync -a ./ sdk/package/${{ steps.meta.outputs.pkg_name }} --exclude .git

      - name: Build package
        run: |
          cd sdk
          make package/${{ steps.meta.outputs.pkg_name }}/compile V=s

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.pkg_name }}-${{ matrix.target }}
          path: |
            sdk/bin/packages/*/*/*.${{ matrix.target == 'snapshot' && 'apk' || 'ipk' }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts per target
        run: |
          cd artifacts
          for dir in *; do
            zip -r "../${dir}.zip" "$dir"
          done
          cd ..

      - name: Extract PKG metadata for release
        id: meta
        run: |
          eval $(grep -E 'PKG_(NAME|VERSION|RELEASE):=' Makefile | sed 's/:=/=/g')
          echo "tag_name=${PKG_NAME}-v${PKG_VERSION}-${PKG_RELEASE}" >> $GITHUB_OUTPUT
          echo "release_name=${PKG_NAME} v${PKG_VERSION}-${PKG_RELEASE}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
